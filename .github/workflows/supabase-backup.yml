name: Supabase Backup

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Run backup
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          mkdir backup
          supabase db dump --db-url "$SUPABASE_DB_URL" --file backup/data.sql
          supabase db dump --db-url "$SUPABASE_DB_URL" --schema-only --file backup/schema.sql
          supabase db dump --db-url "$SUPABASE_DB_URL" --roles-only --file backup/roles.sql

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup
          path: backup
